<svg viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>DR Multi-Region Architecture</title>
  <desc>Orchestrator runs as active/standby across two AWS regions. Primary region manages BU clusters. DR region is a warm standby ready to take over within 15 minutes.</desc>
  <defs>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d97706"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#ffffff"/>

  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">DR Multi-Region Architecture</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Orchestrator runs active/standby across two AWS regions · Git is the source of truth · BU workloads unaffected during failover</text>

  <!-- ══ PRIMARY REGION ══ -->
  <rect x="20" y="58" width="280" height="200" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="20" y="58" width="280" height="32" rx="10" fill="#15803d"/>
  <text x="30" y="71" font-size="10" fill="#bbf7d0">🟢</text>
  <text x="160" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">PRIMARY REGION  (e.g. us-east-1)</text>

  <rect x="36" y="100" width="248" height="144" rx="7" fill="#4f46e5" stroke="#3730a3" stroke-width="1.5"/>
  <text x="160" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">ORCHESTRATOR — PROD</text>
  <rect x="48" y="127" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="140" text-anchor="middle" font-size="10" fill="#e0e7ff">Crossplane · ArgoCD · Backstage</text>
  <rect x="48" y="149" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="162" text-anchor="middle" font-size="10" fill="#e0e7ff">CRDs · Live traffic · Active writes</text>
  <rect x="48" y="171" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="184" text-anchor="middle" font-size="10" fill="#e0e7ff">Manages all BU clusters</text>
  <rect x="48" y="193" width="224" height="18" rx="3" fill="rgba(255,255,255,0.12)"/>
  <text x="160" y="206" text-anchor="middle" font-size="10" fill="#c7d2fe">etcd → backup to S3 every 5 min</text>
  <rect x="48" y="215" width="224" height="18" rx="3" fill="rgba(255,255,255,0.12)"/>
  <text x="160" y="228" text-anchor="middle" font-size="10" fill="#c7d2fe">Backstage DB → read replica in DR</text>

  <!-- ══ DR REGION ══ -->
  <rect x="600" y="58" width="280" height="200" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="7,3"/>
  <rect x="600" y="58" width="280" height="32" rx="10" fill="#92400e"/>
  <text x="610" y="71" font-size="10" fill="#fde68a">🟡</text>
  <text x="740" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">DR REGION  (e.g. us-west-2)</text>

  <rect x="616" y="100" width="248" height="144" rx="7" fill="#818cf8" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="740" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">ORCHESTRATOR — DR</text>
  <rect x="628" y="127" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="740" y="140" text-anchor="middle" font-size="10" fill="#e0e7ff">Crossplane · ArgoCD · Backstage</text>
  <rect x="628" y="149" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="740" y="162" text-anchor="middle" font-size="10" fill="#e0e7ff">Warm standby · No live traffic</text>
  <rect x="628" y="171" width="224" height="18" rx="3" fill="rgba(255,255,255,0.15)"/>
  <text x="740" y="184" text-anchor="middle" font-size="10" fill="#e0e7ff">Re-derives state from Git on promotion</text>
  <rect x="628" y="193" width="224" height="18" rx="3" fill="rgba(255,255,255,0.12)"/>
  <text x="740" y="206" text-anchor="middle" font-size="10" fill="#c7d2fe">etcd restored from S3 backup</text>
  <rect x="628" y="215" width="224" height="18" rx="3" fill="rgba(255,255,255,0.12)"/>
  <text x="740" y="228" text-anchor="middle" font-size="10" fill="#c7d2fe">Backstage DB promoted read replica</text>

  <!-- ══ STATE SYNC arrows between regions ══ -->
  <!-- continuous sync -->
  <path d="M300,148 C420,148 480,148 600,148" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <text x="450" y="138" text-anchor="middle" font-size="9" font-weight="600" fill="#16a34a">continuous state sync</text>
  <text x="450" y="150" text-anchor="middle" font-size="9" fill="#16a34a">(etcd backup · DB replication · Git)</text>

  <!-- ready to take over -->
  <path d="M600,180 C480,180 420,180 300,180" stroke="#d97706" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-amber)"/>
  <text x="450" y="175" text-anchor="middle" font-size="9" fill="#d97706">ready to take over on failover</text>

  <!-- RTO/RPO badges -->
  <rect x="380" y="192" width="140" height="36" rx="6" fill="#1e293b"/>
  <text x="450" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="#f8fafc">RTO &lt; 15 min</text>
  <text x="450" y="221" text-anchor="middle" font-size="10" font-weight="700" fill="#f8fafc">RPO &lt; 5 min</text>

  <!-- ══ BU CLUSTERS ══ -->
  <rect x="20" y="276" width="860" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="294" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">BU WORKLOAD CLUSTERS  —  any region</text>

  <!-- BU-A -->
  <rect x="36" y="300" width="130" height="34" rx="5" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="101" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">BU-A  dev + prod</text>
  <text x="101" y="328" text-anchor="middle" font-size="9" fill="#047857">runs independently</text>

  <!-- BU-B -->
  <rect x="182" y="300" width="130" height="34" rx="5" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="247" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">BU-B  dev + prod</text>
  <text x="247" y="328" text-anchor="middle" font-size="9" fill="#047857">runs independently</text>

  <!-- BU-C -->
  <rect x="328" y="300" width="130" height="34" rx="5" fill="#ccfbf1" stroke="#0d9488" stroke-width="1"/>
  <text x="393" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">BU-C  dev + prod</text>
  <text x="393" y="328" text-anchor="middle" font-size="9" fill="#047857">runs independently</text>

  <!-- Impact note -->
  <rect x="480" y="298" width="386" height="40" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="673" y="314" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">✓ Zero impact during orchestrator outage</text>
  <text x="673" y="330" text-anchor="middle" font-size="9" fill="#16a34a">BU applications keep serving traffic. New provisioning pauses (&lt;15 min) then resumes on DR.</text>

  <!-- Arrows: PROD → BU clusters -->
  <path d="M160,258 L160,276" stroke="#4f46e5" stroke-width="1.5" fill="none" marker-end="url(#arr-slate)"/>
  <text x="164" y="270" font-size="8" fill="#6366f1">manages</text>

  <!-- Arrow: DR → BU clusters (dashed) -->
  <path d="M740,258 C740,268 393,268 393,276" stroke="#818cf8" stroke-width="1.5" fill="none" stroke-dasharray="4,2" marker-end="url(#arr-slate)"/>
  <text x="620" y="268" font-size="8" fill="#818cf8">takes over on failover</text>
</svg>
