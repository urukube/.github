<svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>urukube — Repository Calling Diagram</title>
  <desc>How the eight urukube repos call each other: orchestrator triggers orchestrator-plane-setup via workflow_call; orchestrator-plane-setup wires three sequential Terraform root modules that each call a leaf module; release-workflow is shared by every repo for semantic versioning.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-teal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0d9488"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-slate" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════════════
       TITLE
  ══════════════════════════════════════════════════ -->
  <text x="550" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">urukube — Repository Calling Graph</text>
  <text x="550" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Eight repos · two call layers · four leaf Terraform modules · one shared release workflow</text>

  <!-- ══════════════════════════════════════════════════
       ORCHESTRATOR  (calling / entry-point repo)
  ══════════════════════════════════════════════════ -->
  <rect x="320" y="58" width="350" height="75" rx="10" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="495" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">orchestrator</text>
  <text x="495" y="95" text-anchor="middle" font-size="10" fill="#c7d2fe">calling repo — no Terraform code</text>
  <text x="495" y="111" text-anchor="middle" font-size="9" fill="#a5b4fc">ci.yml (workflow_dispatch) · destroy.yml (workflow_dispatch + confirm gate)</text>
  <text x="495" y="124" text-anchor="middle" font-size="9" fill="#a5b4fc">orchestrator.tfvars  ·  S3 bucket: urukube-orchestrator-tfstate</text>

  <!-- arrow orchestrator → orchestrator-plane-setup -->
  <line x1="495" y1="133" x2="495" y2="158" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="510" y="150" font-size="9" fill="#7c3aed" font-weight="600">workflow_call @v1</text>

  <!-- ══════════════════════════════════════════════════
       ORCHESTRATOR-PLANE-SETUP  (reusable workflow)
  ══════════════════════════════════════════════════ -->
  <rect x="16" y="160" width="900" height="255" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="16" y="160" width="900" height="28" rx="10" fill="#7c3aed"/>
  <text x="466" y="179" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">orchestrator-plane-setup  (reusable workflow — main.yml + destroy.yml)</text>
  <text x="466" y="193" text-anchor="middle" font-size="9" fill="#6d28d9">Checks out this repo at runtime · runs 3 sequential Terraform plan-apply steps · reads tfvars + state bucket from caller inputs</text>

  <!-- ─── STAGE 1: eks-infra ─── -->
  <rect x="28" y="200" width="268" height="203" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="28" y="200" width="268" height="24" rx="8" fill="#5b21b6"/>
  <text x="162" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">① eks-infra</text>
  <text x="162" y="240" text-anchor="middle" font-size="9" fill="#4c1d95">Provisions VPC + EKS cluster</text>
  <text x="162" y="255" text-anchor="middle" font-size="9" fill="#5b21b6">├ networking-setup.tf</text>
  <text x="162" y="269" text-anchor="middle" font-size="9" fill="#5b21b6">└ eks-infra-setup.tf</text>
  <text x="162" y="288" text-anchor="middle" font-size="8" font-style="italic" fill="#6d28d9">Calls two TF modules:</text>
  <text x="162" y="302" text-anchor="middle" font-size="9" font-weight="600" fill="#4c1d95">terraform-module-networking @v1.1.2</text>
  <text x="162" y="316" text-anchor="middle" font-size="9" font-weight="600" fill="#4c1d95">terraform-module-eks @v1.2.0</text>
  <text x="162" y="334" text-anchor="middle" font-size="8" font-style="italic" fill="#7c3aed">Outputs → S3 remote state</text>
  <text x="162" y="348" text-anchor="middle" font-size="8" fill="#6d28d9">(cluster_endpoint, oidc_arn, vpc_id, …)</text>
  <text x="162" y="367" text-anchor="middle" font-size="8" fill="#7c3aed">backend: S3  key: {env}/eks-infra</text>
  <text x="162" y="381" text-anchor="middle" font-size="8" fill="#7c3aed">approver gate before apply</text>

  <!-- S3 state arrow stage 1 → stage 2 -->
  <line x1="296" y1="290" x2="334" y2="290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-slate)"/>
  <text x="315" y="285" text-anchor="middle" font-size="8" fill="#64748b">S3 state</text>

  <!-- ─── STAGE 2: eks-essential-addons ─── -->
  <rect x="334" y="200" width="268" height="203" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <rect x="334" y="200" width="268" height="24" rx="8" fill="#059669"/>
  <text x="468" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">② eks-essential-addons</text>
  <text x="468" y="240" text-anchor="middle" font-size="9" fill="#064e3b">Installs cluster-critical add-ons</text>
  <text x="468" y="255" text-anchor="middle" font-size="9" fill="#065f46">eks-essential-addons-setup.tf</text>
  <text x="468" y="275" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">Reads eks-infra remote state for</text>
  <text x="468" y="289" text-anchor="middle" font-size="8" fill="#065f46">cluster_name, endpoint, oidc_arn, vpc_id</text>
  <text x="468" y="308" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">Calls one TF module:</text>
  <text x="468" y="322" text-anchor="middle" font-size="9" font-weight="600" fill="#064e3b">terraform-module-essential-addons @v1.0.1</text>
  <text x="468" y="342" text-anchor="middle" font-size="8" fill="#065f46">CoreDNS · VPC CNI · EBS CSI</text>
  <text x="468" y="356" text-anchor="middle" font-size="8" fill="#065f46">AWS LB Controller · Cluster Autoscaler</text>
  <text x="468" y="370" text-anchor="middle" font-size="8" fill="#065f46">Metrics Server · Pod Identity Agent</text>
  <text x="468" y="388" text-anchor="middle" font-size="8" fill="#059669">backend: S3  key: {env}/eks-essential-addons</text>

  <!-- S3 state arrow stage 2 → stage 3 -->
  <line x1="602" y1="290" x2="640" y2="290" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-slate)"/>
  <text x="621" y="285" text-anchor="middle" font-size="8" fill="#64748b">S3 state</text>

  <!-- ─── STAGE 3: orchestrator-custom-addons ─── -->
  <rect x="640" y="200" width="268" height="203" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <rect x="640" y="200" width="268" height="24" rx="8" fill="#b45309"/>
  <text x="774" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">③ orchestrator-custom-addons</text>
  <text x="774" y="240" text-anchor="middle" font-size="9" fill="#431607">Installs orchestrator platform tools</text>
  <text x="774" y="255" text-anchor="middle" font-size="9" fill="#78350f">orchestrator-custom-addons-setup.tf</text>
  <text x="774" y="275" text-anchor="middle" font-size="8" font-style="italic" fill="#d97706">Reads eks-infra remote state for</text>
  <text x="774" y="289" text-anchor="middle" font-size="8" fill="#92400e">cluster_name, endpoint, oidc_arn</text>
  <text x="774" y="308" text-anchor="middle" font-size="8" font-style="italic" fill="#d97706">Calls one TF module:</text>
  <text x="774" y="322" text-anchor="middle" font-size="9" font-weight="600" fill="#431607">orchestrator-custom-addons @v1.1.12</text>
  <text x="774" y="342" text-anchor="middle" font-size="8" fill="#92400e">Istio · ArgoCD · ECR updater</text>
  <text x="774" y="356" text-anchor="middle" font-size="8" fill="#92400e">Image Updater · Crossplane · ESO</text>
  <text x="774" y="370" text-anchor="middle" font-size="8" fill="#92400e">Prometheus · Kiali</text>
  <text x="774" y="388" text-anchor="middle" font-size="8" fill="#d97706">backend: S3  key: {env}/orchestrator-custom-addons</text>

  <!-- ══════════════════════════════════════════════════
       LEAF TF MODULE REPOS  (bottom row)
  ══════════════════════════════════════════════════ -->

  <!-- terraform-module-networking -->
  <rect x="16" y="450" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="16" y="450" width="200" height="24" rx="8" fill="#15803d"/>
  <text x="116" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">terraform-module-networking</text>
  <text x="116" y="487" text-anchor="middle" font-size="9" fill="#14532d">AWS VPC · 3-tier subnets · NAT GW</text>
  <text x="116" y="501" text-anchor="middle" font-size="9" fill="#14532d">security groups · VPC endpoints</text>
  <text x="116" y="516" text-anchor="middle" font-size="9" fill="#16a34a">ref: v1.1.2  ·  11 tests</text>

  <!-- terraform-module-eks -->
  <rect x="230" y="450" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="230" y="450" width="200" height="24" rx="8" fill="#15803d"/>
  <text x="330" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">terraform-module-eks</text>
  <text x="330" y="487" text-anchor="middle" font-size="9" fill="#14532d">EKS cluster · self-managed node group</text>
  <text x="330" y="501" text-anchor="middle" font-size="9" fill="#14532d">launch template · IMDSv2 · EBS encrypt</text>
  <text x="330" y="516" text-anchor="middle" font-size="9" fill="#16a34a">ref: v1.2.0</text>

  <!-- terraform-module-essential-addons -->
  <rect x="444" y="450" width="228" height="80" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="444" y="450" width="228" height="24" rx="8" fill="#15803d"/>
  <text x="558" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">terraform-module-essential-addons</text>
  <text x="558" y="487" text-anchor="middle" font-size="9" fill="#14532d">CoreDNS · VPC CNI · EBS CSI · LB Ctrl</text>
  <text x="558" y="501" text-anchor="middle" font-size="9" fill="#14532d">Cluster Autoscaler · Metrics · Pod Identity</text>
  <text x="558" y="516" text-anchor="middle" font-size="9" fill="#16a34a">ref: v1.0.1</text>

  <!-- orchestrator-custom-addons (TF module) -->
  <rect x="686" y="450" width="228" height="80" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <rect x="686" y="450" width="228" height="24" rx="8" fill="#b45309"/>
  <text x="800" y="467" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">orchestrator-custom-addons</text>
  <text x="800" y="487" text-anchor="middle" font-size="9" fill="#431607">Istio · ArgoCD · Crossplane · ESO</text>
  <text x="800" y="501" text-anchor="middle" font-size="9" fill="#431607">Prometheus · Kiali · ECR pull role</text>
  <text x="800" y="516" text-anchor="middle" font-size="9" fill="#d97706">ref: v1.1.12  ·  toggle variables</text>

  <!-- arrows from stage 1 (eks-infra) to networking + eks modules -->
  <line x1="116" y1="415" x2="116" y2="448" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="162" y1="415" x2="330" y2="448" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="116" y="443" text-anchor="middle" font-size="8" fill="#15803d">TF source</text>

  <!-- arrow from stage 2 (eks-essential-addons) to essential-addons module -->
  <line x1="558" y1="415" x2="558" y2="448" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="575" y="440" font-size="8" fill="#15803d">TF source</text>

  <!-- arrow from stage 3 (orchestrator-custom-addons) to custom-addons module -->
  <line x1="800" y1="415" x2="800" y2="448" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="817" y="440" font-size="8" fill="#d97706">TF source</text>

  <!-- ══════════════════════════════════════════════════
       RELEASE-WORKFLOW  (right-side shared repo)
  ══════════════════════════════════════════════════ -->
  <rect x="940" y="58" width="148" height="472" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="940" y="58" width="148" height="28" rx="10" fill="#15803d"/>
  <text x="1014" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">release-workflow</text>
  <text x="1014" y="103" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Shared by all repos</text>
  <text x="1014" y="118" text-anchor="middle" font-size="9" fill="#16a34a">Semantic versioning</text>
  <text x="1014" y="133" text-anchor="middle" font-size="9" fill="#16a34a">via Conventional Commits</text>
  <line x1="1014" y1="145" x2="1014" y2="162" stroke="#16a34a" stroke-width="1"/>
  <text x="1014" y="175" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">version.yml</text>
  <text x="1014" y="190" text-anchor="middle" font-size="8" fill="#16a34a">workflow_call entry</text>
  <text x="1014" y="205" text-anchor="middle" font-size="8" fill="#16a34a">point for all repos</text>
  <line x1="1014" y1="215" x2="1014" y2="232" stroke="#16a34a" stroke-width="1"/>
  <text x="1014" y="245" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">action.yml</text>
  <text x="1014" y="260" text-anchor="middle" font-size="8" fill="#16a34a">Composite action</text>
  <text x="1014" y="275" text-anchor="middle" font-size="8" fill="#16a34a">semantic-release +</text>
  <text x="1014" y="290" text-anchor="middle" font-size="8" fill="#16a34a">PR title validation</text>
  <line x1="1014" y1="300" x2="1014" y2="317" stroke="#16a34a" stroke-width="1"/>
  <text x="1014" y="330" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">semantic-version.sh</text>
  <text x="1014" y="345" text-anchor="middle" font-size="8" fill="#16a34a">Bash orchestration</text>
  <line x1="1014" y1="355" x2="1014" y2="372" stroke="#16a34a" stroke-width="1"/>
  <text x="1014" y="385" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Trigger pattern</text>
  <text x="1014" y="400" text-anchor="middle" font-size="8" fill="#16a34a">workflow_run on CI</text>
  <text x="1014" y="415" text-anchor="middle" font-size="8" fill="#16a34a">completion (not push)</text>
  <text x="1014" y="430" text-anchor="middle" font-size="8" fill="#16a34a">Failed CI blocks</text>
  <text x="1014" y="445" text-anchor="middle" font-size="8" fill="#16a34a">the release</text>
  <text x="1014" y="465" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">6 repos call this</text>
  <text x="1014" y="480" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">via @v1 tag</text>
  <text x="1014" y="498" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">urukube/release-workflow</text>
  <text x="1014" y="513" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">/.github/workflows</text>
  <text x="1014" y="528" text-anchor="middle" font-size="8" font-style="italic" fill="#059669">/version.yml@v1</text>

  <!-- dashed line from orchestrator to release-workflow -->
  <line x1="670" y1="90" x2="938" y2="90" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="800" y="84" text-anchor="middle" font-size="8" fill="#16a34a">workflow_run (CI done) → release</text>

  <!-- ══════════════════════════════════════════════════
       LEGEND
  ══════════════════════════════════════════════════ -->
  <rect x="16" y="548" width="900" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="568" font-size="10" font-weight="700" fill="#111827">Legend</text>

  <!-- legend items -->
  <rect x="30" y="578" width="14" height="14" rx="3" fill="#4f46e5"/>
  <text x="50" y="590" font-size="9" fill="#374151">Entry-point calling repo (no TF code; only .tfvars + workflow triggers)</text>

  <rect x="30" y="598" width="14" height="14" rx="3" fill="#7c3aed"/>
  <text x="50" y="610" font-size="9" fill="#374151">Reusable workflow repo (checked out at runtime; owns all Terraform logic in subdirectories)</text>

  <rect x="30" y="618" width="14" height="14" rx="3" fill="#15803d"/>
  <text x="50" y="630" font-size="9" fill="#374151">Leaf Terraform module repos (pinned with ref=vX.Y.Z; consumed via git source blocks)</text>

  <line x1="350" y1="578" x2="390" y2="578" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="396" y="582" font-size="9" fill="#374151">workflow_call</text>

  <line x1="350" y1="598" x2="390" y2="598" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="396" y="602" font-size="9" fill="#374151">Terraform module source (git clone at plan time)</text>

  <line x1="350" y1="618" x2="390" y2="618" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-slate)"/>
  <text x="396" y="622" font-size="9" fill="#374151">S3 remote state read (data.terraform_remote_state)</text>

  <line x1="600" y1="578" x2="640" y2="578" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="646" y="582" font-size="9" fill="#374151">workflow_run → release-workflow (all repos)</text>

  <!-- Execution order note -->
  <text x="30" y="655" font-size="9" font-weight="700" fill="#374151">Execution order within orchestrator-plane-setup:</text>
  <text x="30" y="670" font-size="9" fill="#6b7280">① eks-infra (networking + EKS)  →  ② eks-essential-addons (reads eks-infra S3 state)  →  ③ orchestrator-custom-addons (reads eks-infra S3 state)</text>
  <text x="30" y="685" font-size="9" fill="#6b7280">Stages ② and ③ each call data.terraform_remote_state.eks_infra to get cluster_endpoint, oidc_provider_arn, vpc_id, and certificate_authority_data.</text>
  <text x="30" y="700" font-size="9" fill="#6b7280">Each stage has an approver gate before apply. destroy.yml reverses the order: ③ → ② → ①.</text>
</svg>
