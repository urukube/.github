<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>Failover Procedure — Platform Team Runbook</title>
  <desc>Step-by-step failover runbook: alert fires, platform team assesses, minor incidents are handled in place, major incidents trigger DR promotion, then failback to PROD.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#ffffff"/>

  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">Failover Procedure — Platform Team Runbook</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Owned exclusively by the platform team · BU teams are notified, not involved</text>

  <!-- ── COLUMN LAYOUT ──
       Left column: happy path (minor incident)
       Centre column: main DR flow
       Right column: labels / annotations
  -->

  <!-- ══ STEP 1: Alert ══ -->
  <rect x="330" y="58" width="240" height="56" rx="8" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">🚨  Alert Fires</text>
  <text x="450" y="98" text-anchor="middle" font-size="10" fill="#fecaca">Platform on-call paged via PagerDuty</text>

  <!-- Triggers list -->
  <rect x="710" y="58" width="178" height="100" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="799" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">Alert triggers</text>
  <text x="720" y="90" font-size="9" fill="#b91c1c">· API server unresponsive &gt; 2 min</text>
  <text x="720" y="104" font-size="9" fill="#b91c1c">· Crossplane not reconciling &gt; 5 min</text>
  <text x="720" y="118" font-size="9" fill="#b91c1c">· ArgoCD sync failures (all apps)</text>
  <text x="720" y="132" font-size="9" fill="#b91c1c">· Backstage returning 5xx</text>
  <text x="720" y="146" font-size="9" fill="#b91c1c">· DR health-check failing (30s ping)</text>
  <line x1="710" y1="86" x2="572" y2="86" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- arrow down -->
  <line x1="450" y1="114" x2="450" y2="134" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ STEP 2: Assess ══ -->
  <rect x="330" y="138" width="240" height="56" rx="8" fill="#d97706" stroke="#b45309" stroke-width="2"/>
  <text x="450" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Platform Team Assesses</text>
  <text x="450" y="178" text-anchor="middle" font-size="10" fill="#fef3c7">Is PROD recoverable quickly?</text>

  <!-- Branch arrows -->
  <!-- YES → left (minor) -->
  <path d="M330,166 L220,166 L220,212" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)"/>
  <rect x="230" y="158" width="56" height="16" rx="3" fill="#dcfce7"/>
  <text x="258" y="170" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">YES — recoverable</text>

  <!-- NO → down (DR path) -->
  <line x1="450" y1="194" x2="450" y2="214" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <rect x="456" y="196" width="86" height="16" rx="3" fill="#fee2e2"/>
  <text x="499" y="208" text-anchor="middle" font-size="9" font-weight="700" fill="#991b1b">NO — SLA breach risk</text>

  <!-- ══ MINOR PATH (left) ══ -->
  <rect x="80" y="216" width="280" height="56" rx="8" fill="#16a34a" stroke="#166534" stroke-width="2"/>
  <text x="220" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Minor Incident</text>
  <text x="220" y="255" text-anchor="middle" font-size="10" fill="#dcfce7">Restart pods / rollback deployment</text>
  <text x="220" y="269" text-anchor="middle" font-size="10" fill="#dcfce7">No failover needed · resolve in PROD</text>
  <text x="220" y="290" text-anchor="middle" font-size="10" font-style="italic" fill="#86efac">→ End of runbook</text>

  <!-- ══ DR PATH ══ -->

  <!-- Step 3: Declare DR -->
  <rect x="330" y="218" width="240" height="56" rx="8" fill="#dc2626" stroke="#991b1b" stroke-width="2"/>
  <text x="450" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Declare DR Event</text>
  <text x="450" y="255" text-anchor="middle" font-size="10" fill="#fecaca">Escalate to Platform lead</text>
  <text x="450" y="270" text-anchor="middle" font-size="10" fill="#fecaca">Open incident channel</text>

  <line x1="450" y1="274" x2="450" y2="294" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: DNS update -->
  <rect x="330" y="298" width="240" height="52" rx="8" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="450" y="318" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Update DNS / Load Balancer</text>
  <text x="450" y="334" text-anchor="middle" font-size="10" fill="#e0e7ff">Route traffic to DR region</text>
  <rect x="706" y="302" width="78" height="20" rx="4" fill="#312e81"/>
  <text x="745" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#c7d2fe">target: &lt; 5 min</text>
  <line x1="706" y1="312" x2="572" y2="322" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>

  <line x1="450" y1="350" x2="450" y2="368" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Promote DR -->
  <rect x="330" y="372" width="240" height="52" rx="8" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="450" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Promote DR Cluster</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#e0e7ff">Scale up Crossplane + ArgoCD</text>
  <text x="450" y="422" text-anchor="middle" font-size="10" fill="#e0e7ff">Enable Backstage write mode</text>

  <line x1="450" y1="424" x2="450" y2="442" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6: Validate + Notify (side by side) -->
  <rect x="224" y="446" width="200" height="52" rx="8" fill="#4f46e5" stroke="#3730a3" stroke-width="2"/>
  <text x="324" y="466" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Validate</text>
  <text x="324" y="481" text-anchor="middle" font-size="9" fill="#e0e7ff">Crossplane reconciling ✓</text>
  <text x="324" y="494" text-anchor="middle" font-size="9" fill="#e0e7ff">ArgoCD syncing from Git ✓</text>

  <rect x="476" y="446" width="200" height="52" rx="8" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
  <text x="576" y="466" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Notify BU Teams</text>
  <text x="576" y="481" text-anchor="middle" font-size="9" fill="#ede9fe">"Platform in DR mode"</text>
  <text x="576" y="494" text-anchor="middle" font-size="9" fill="#ede9fe">"Existing workloads unaffected"</text>

  <!-- arrows into validate + notify -->
  <path d="M450,442 L324,442 L324,446" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M450,442 L576,442 L576,446" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Right-side restore + failback panel -->
  <rect x="710" y="370" width="178" height="128" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="799" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">After incident resolved</text>
  <rect x="720" y="396" width="158" height="34" rx="5" fill="#16a34a"/>
  <text x="799" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Restore PROD region</text>
  <text x="799" y="424" text-anchor="middle" font-size="9" fill="#dcfce7">Reprovision · sync from DR</text>
  <line x1="799" y1="430" x2="799" y2="446" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <rect x="720" y="450" width="158" height="34" rx="5" fill="#059669"/>
  <text x="799" y="464" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Failback to PROD</text>
  <text x="799" y="478" text-anchor="middle" font-size="9" fill="#dcfce7">Reverse DNS · scale down DR</text>
  <rect x="730" y="486" width="138" height="6" rx="3" fill="#bbf7d0"/>
  <text x="799" y="500" text-anchor="middle" font-size="9" fill="#166534">Failback RTO &lt; 30 min</text>

  <!-- Recovery targets bar -->
  <rect x="20" y="446" width="192" height="52" rx="8" fill="#1e293b"/>
  <text x="116" y="463" text-anchor="middle" font-size="10" font-weight="700" fill="#f8fafc">Recovery Targets</text>
  <text x="116" y="479" text-anchor="middle" font-size="10" fill="#94a3b8">RTO &lt; 15 min  ·  RPO &lt; 5 min</text>
  <text x="116" y="493" text-anchor="middle" font-size="10" fill="#94a3b8">Failback RTO &lt; 30 min</text>
</svg>
