<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>urukube IDP — Provisioning and Delivery Flows</title>
  <desc>Two flows: Flow 1 shows BU Admin using Backstage to trigger Crossplane provisioning of dev and prod clusters in separate BU AWS accounts. Flow 2 shows a developer pushing code that ArgoCD deploys to the correct BU cluster.</desc>

  <rect width="900" height="620" fill="#ffffff"/>

  <!-- ── Title ── -->
  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">urukube IDP — How It Works</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#6b7280">Two flows: ① Provision a BU environment (once)   ② Deploy code into it (every push)</text>

  <!-- ════════════════════════════════════════════════════════════
       FLOW 1 HEADER
  ════════════════════════════════════════════════════════════ -->
  <rect x="20" y="58" width="860" height="20" rx="4" fill="#1e293b"/>
  <text x="450" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc" letter-spacing="0.8">① SELF-SERVICE PROVISIONING — happens once per BU environment</text>

  <!-- Lane: BU Admin -->
  <rect x="20" y="78" width="108" height="120" rx="0" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="74" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">BU ADMIN</text>
  <text x="74" y="110" text-anchor="middle" font-size="9" fill="#3b82f6">one-time</text>
  <text x="74" y="122" text-anchor="middle" font-size="9" fill="#3b82f6">setup</text>

  <!-- Lane: Orchestrator -->
  <rect x="128" y="78" width="108" height="120" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="182" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">ORCHESTRATOR</text>
  <text x="182" y="110" text-anchor="middle" font-size="9" fill="#94a3b8">control plane</text>
  <text x="182" y="122" text-anchor="middle" font-size="9" fill="#94a3b8">no BU workloads</text>

  <!-- Lane: AWS Cloud -->
  <rect x="236" y="78" width="644" height="120" rx="0" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <text x="558" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">AWS CLOUD — Crossplane provisions in BU's own accounts</text>

  <!-- BU Admin box -->
  <rect x="28" y="102" width="92" height="52" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="74" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Backstage</text>
  <text x="74" y="136" text-anchor="middle" font-size="9" fill="#3b82f6">BU fills in form</text>
  <text x="74" y="148" text-anchor="middle" font-size="9" fill="#3b82f6">+ AWS account IDs</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="128" x2="134" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Crossplane box -->
  <rect x="136" y="102" width="92" height="52" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="182" y="120" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Crossplane</text>
  <text x="182" y="134" text-anchor="middle" font-size="9" fill="#b45309">reads CRD</text>
  <text x="182" y="148" text-anchor="middle" font-size="9" fill="#b45309">assumes BU IAM role</text>

  <!-- Arrow 2 -->
  <line x1="228" y1="128" x2="244" y2="128" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BU Dev Account -->
  <rect x="252" y="100" width="290" height="88" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="2"/>
  <text x="397" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">▸ BU Dev AWS Account</text>

  <rect x="262" y="122" width="130" height="20" rx="3" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="327" y="136" text-anchor="middle" font-size="9" fill="#9a3412">VPC · 1 public + 2 private subnets · NAT GW</text>

  <rect x="262" y="146" width="70" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="297" y="159" text-anchor="middle" font-size="9" fill="#065f46">EKS cluster</text>

  <rect x="338" y="146" width="50" height="18" rx="3" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="363" y="159" text-anchor="middle" font-size="9" fill="#4c1d95">IRSA · OIDC</text>

  <rect x="394" y="146" width="50" height="18" rx="3" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="419" y="159" text-anchor="middle" font-size="9" fill="#9d174d">ESO · Cilium</text>

  <text x="397" y="180" text-anchor="middle" font-size="9" fill="#6b7280">+ ArgoCD agent (registered with orchestrator ArgoCD)</text>

  <!-- Arrow between accounts -->
  <text x="554" y="132" text-anchor="middle" font-size="18" fill="#94a3b8">→</text>

  <!-- BU Prod Account -->
  <rect x="566" y="100" width="290" height="88" rx="6" fill="#ffffff" stroke="#6ee7b7" stroke-width="2"/>
  <text x="711" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">▸ BU Prod AWS Account</text>

  <rect x="576" y="122" width="130" height="20" rx="3" fill="#fff7ed" stroke="#fb923c" stroke-width="1"/>
  <text x="641" y="136" text-anchor="middle" font-size="9" fill="#9a3412">VPC · 1 public + 2 private subnets · NAT GW</text>

  <rect x="576" y="146" width="70" height="18" rx="3" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="611" y="159" text-anchor="middle" font-size="9" fill="#065f46">EKS cluster</text>

  <rect x="652" y="146" width="50" height="18" rx="3" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="677" y="159" text-anchor="middle" font-size="9" fill="#4c1d95">IRSA · OIDC</text>

  <rect x="708" y="146" width="50" height="18" rx="3" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="733" y="159" text-anchor="middle" font-size="9" fill="#9d174d">ESO · Cilium</text>

  <text x="711" y="180" text-anchor="middle" font-size="9" fill="#6b7280">+ ArgoCD agent (registered with orchestrator ArgoCD)</text>

  <!-- ════════════════════════════════════════════════════════════
       FLOW 2 HEADER
  ════════════════════════════════════════════════════════════ -->
  <rect x="20" y="218" width="860" height="20" rx="4" fill="#065f46"/>
  <text x="450" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#f8fafc" letter-spacing="0.8">② CODE DELIVERY — happens on every git push by a BU developer</text>

  <!-- Lane labels flow 2 -->
  <rect x="20" y="238" width="108" height="130" rx="0" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="74" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">BU A DEV</text>
  <text x="74" y="270" text-anchor="middle" font-size="9" fill="#3b82f6">day-to-day</text>
  <text x="74" y="282" text-anchor="middle" font-size="9" fill="#3b82f6">code push</text>

  <rect x="128" y="238" width="108" height="130" rx="0" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="182" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#475569">ORCHESTRATOR</text>
  <text x="182" y="270" text-anchor="middle" font-size="9" fill="#94a3b8">ArgoCD watches</text>
  <text x="182" y="282" text-anchor="middle" font-size="9" fill="#94a3b8">all BU repos</text>

  <rect x="236" y="238" width="644" height="130" rx="0" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="558" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">DELIVERY — deploys only to the matching BU cluster</text>

  <!-- Step 1: git push -->
  <rect x="28" y="264" width="92" height="48" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="74" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">git push</text>
  <text x="74" y="296" text-anchor="middle" font-size="9" fill="#3b82f6">repo tagged</text>
  <text x="74" y="308" text-anchor="middle" font-size="9" fill="#3b82f6">as BU A</text>

  <!-- Arrow -->
  <line x1="120" y1="288" x2="134" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ArgoCD box -->
  <rect x="136" y="264" width="92" height="48" rx="5" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="182" y="282" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">ArgoCD</text>
  <text x="182" y="296" text-anchor="middle" font-size="9" fill="#047857">matches repo</text>
  <text x="182" y="308" text-anchor="middle" font-size="9" fill="#047857">→ BU A cluster</text>

  <!-- Arrow -->
  <line x1="228" y1="288" x2="244" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CI + Git update -->
  <rect x="252" y="262" width="130" height="52" rx="5" fill="#ffffff" stroke="#a3e635" stroke-width="1.5"/>
  <text x="317" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#365314">GitHub CI</text>
  <text x="317" y="293" text-anchor="middle" font-size="9" fill="#4d7c0f">build + sign (cosign)</text>
  <text x="317" y="307" text-anchor="middle" font-size="9" fill="#4d7c0f">push to JFrog · bump tag</text>

  <line x1="382" y1="288" x2="396" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ArgoCD reconcile -->
  <rect x="404" y="262" width="130" height="52" rx="5" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="469" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">ArgoCD reconciles</text>
  <text x="469" y="293" text-anchor="middle" font-size="9" fill="#047857">detects Git tag bump</text>
  <text x="469" y="307" text-anchor="middle" font-size="9" fill="#047857">syncs manifests</text>

  <line x1="534" y1="288" x2="548" y2="288" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BU A Dev cluster result -->
  <rect x="556" y="262" width="150" height="52" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="631" y="279" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">BU A Dev Cluster</text>
  <text x="631" y="293" text-anchor="middle" font-size="9" fill="#3b82f6">✓ app deployed</text>
  <text x="631" y="307" text-anchor="middle" font-size="9" fill="#3b82f6">scoped to BU A only</text>

  <!-- Not deployed indicator -->
  <rect x="716" y="262" width="150" height="52" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="791" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">BU A Prod Cluster</text>
  <text x="791" y="293" text-anchor="middle" font-size="9" fill="#94a3b8">promotion via Kargo</text>
  <text x="791" y="307" text-anchor="middle" font-size="9" fill="#94a3b8">(Phase 2)</text>

  <!-- isolation callout -->
  <text x="631" y="348" text-anchor="middle" font-size="9" font-style="italic" fill="#6b7280">ArgoCD does not deploy to BU B or any other BU — Application scoping enforces isolation</text>

  <!-- ════════════════════════════════════════════════════════════
       KEY PRINCIPLES
  ════════════════════════════════════════════════════════════ -->
  <rect x="20" y="378" width="860" height="76" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="395" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Key Principles</text>

  <!-- principle 1 -->
  <rect x="34" y="404" width="8" height="8" rx="1" fill="#3b82f6"/>
  <text x="48" y="413" font-size="10" fill="#374151"><tspan font-weight="600">Orchestrator = control plane only.</tspan> Runs Crossplane, ArgoCD, Backstage. Zero BU workloads.</text>

  <!-- principle 2 -->
  <rect x="34" y="420" width="8" height="8" rx="1" fill="#f59e0b"/>
  <text x="48" y="429" font-size="10" fill="#374151"><tspan font-weight="600">Cross-account isolation.</tspan> Each BU has its own AWS accounts (dev + prod). Crossplane assumes a cross-account IAM role to provision there.</text>

  <!-- principle 3 -->
  <rect x="34" y="436" width="8" height="8" rx="1" fill="#10b981"/>
  <text x="48" y="445" font-size="10" fill="#374151"><tspan font-weight="600">Git is source of truth.</tspan> No direct kubectl. ArgoCD continuously reconciles each cluster to what Git declares. Promotion is a Git operation.</text>

  <!-- principle 4 -->
  <rect x="34" y="452" width="8" height="8" rx="1" fill="#8b5cf6"/>
  <text x="48" y="461" font-size="10" fill="#374151"><tspan font-weight="600">BU workloads are isolated.</tspan> An orchestrator outage does not affect running BU apps. BU clusters run independently.</text>

  <!-- ════════════════════════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════════════════════ -->
  <rect x="20" y="466" width="860" height="36" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="32" y="480" font-size="10" font-weight="700" fill="#475569">Legend</text>

  <rect x="80" y="470" width="10" height="10" rx="2" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="96" y="480" font-size="9" fill="#374151">BU / self-service</text>

  <rect x="190" y="470" width="10" height="10" rx="2" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="206" y="480" font-size="9" fill="#374151">Crossplane / infra</text>

  <rect x="310" y="470" width="10" height="10" rx="2" fill="#d1fae5" stroke="#10b981"/>
  <text x="326" y="480" font-size="9" fill="#374151">ArgoCD / GitOps</text>

  <rect x="420" y="470" width="10" height="10" rx="2" fill="#fff7ed" stroke="#fb923c"/>
  <text x="436" y="480" font-size="9" fill="#374151">VPC / networking</text>

  <rect x="530" y="470" width="10" height="10" rx="2" fill="#ede9fe" stroke="#8b5cf6"/>
  <text x="546" y="480" font-size="9" fill="#374151">IAM / security</text>

  <rect x="630" y="470" width="10" height="10" rx="2" fill="#fce7f3" stroke="#ec4899"/>
  <text x="646" y="480" font-size="9" fill="#374151">Add-ons (ESO, Cilium)</text>

  <text x="32" y="496" font-size="9" fill="#94a3b8">Billing: Orchestrator cluster = platform team cost (flat)  ·  BU dev + prod clusters = charged to BU cost center</text>

  <!-- ── Arrow marker ── -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
