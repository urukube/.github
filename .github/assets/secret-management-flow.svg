<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif" font-size="12">
  <title>ESO Secret Flow — orchestrator cluster</title>
  <desc>End-to-end flow: GitHub Actions injects secret values into Terraform which provisions AWS Secrets Manager secrets. ESO on the orchestrator cluster uses IRSA to pull those secrets and sync them as Kubernetes secrets consumed by ArgoCD.</desc>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/></marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/></marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#b45309"/></marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/></marker>
  </defs>

  <rect width="960" height="660" fill="#ffffff"/>

  <!-- TITLE -->
  <text x="480" y="22" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">ESO — Secret Provisioning &amp; Sync Flow</text>
  <text x="480" y="39" text-anchor="middle" font-size="10" fill="#6b7280">Terraform provisions secrets in AWS · ESO syncs them into Kubernetes · ArgoCD consumes them</text>

  <!-- GitHub Org Secrets -->
  <rect x="16" y="54" width="178" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="16" y="54" width="178" height="22" rx="8" fill="#0f172a"/>
  <text x="105" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#f8fafc">GitHub Org Secrets</text>
  <text x="105" y="90" text-anchor="middle" font-size="9" fill="#94a3b8">ARGO_ADMIN_SECRET</text>
  <text x="105" y="104" text-anchor="middle" font-size="9" fill="#94a3b8">(bcrypt hash of admin pwd)</text>
  <text x="105" y="118" text-anchor="middle" font-size="9" fill="#94a3b8">PLATFORM_GITHUB_PAT</text>
  <text x="105" y="132" text-anchor="middle" font-size="9" fill="#94a3b8">(long-lived PAT, repo + read:org)</text>

  <!-- arrow org secrets → TF stage -->
  <line x1="194" y1="99" x2="222" y2="99" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="208" y="93" text-anchor="middle" font-size="8" fill="#64748b">TF_VAR_</text>
  <text x="208" y="105" text-anchor="middle" font-size="8" fill="#64748b">secret_values</text>

  <!-- Terraform Stage -->
  <rect x="222" y="54" width="178" height="138" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="222" y="54" width="178" height="22" rx="8" fill="#7c3aed"/>
  <text x="311" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">orchestrator-secret-management</text>
  <text x="311" y="90" text-anchor="middle" font-size="9" fill="#4c1d95">TF module ref: v1.2.0</text>
  <text x="311" y="106" text-anchor="middle" font-size="8" fill="#6d28d9">secrets.auto.tfvars.json</text>
  <text x="311" y="120" text-anchor="middle" font-size="8" fill="#6d28d9">declares SM paths + descriptions</text>
  <text x="311" y="137" text-anchor="middle" font-size="8" fill="#7c3aed">aws_secretsmanager_secret (×2)</text>
  <text x="311" y="151" text-anchor="middle" font-size="8" fill="#7c3aed">aws_secretsmanager_secret_version</text>
  <text x="311" y="165" text-anchor="middle" font-size="8" font-style="italic" fill="#6d28d9">ignore_changes=[secret_string]</text>
  <text x="311" y="179" text-anchor="middle" font-size="8" font-style="italic" fill="#6d28d9">(TF only creates, never overwrites)</text>

  <!-- arrow TF → AWS SM -->
  <line x1="400" y1="123" x2="428" y2="123" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="414" y="116" text-anchor="middle" font-size="8" fill="#7c3aed">creates</text>

  <!-- AWS Secrets Manager -->
  <rect x="428" y="54" width="200" height="192" rx="8" fill="#fff7ed" stroke="#d97706" stroke-width="2"/>
  <rect x="428" y="54" width="200" height="22" rx="8" fill="#b45309"/>
  <text x="528" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">AWS Secrets Manager</text>

  <rect x="440" y="82" width="176" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="528" y="98" text-anchor="middle" font-size="9" font-weight="700" fill="#78350f">platform/argocd/admin-password</text>
  <text x="528" y="112" text-anchor="middle" font-size="8" fill="#92400e">value: bcrypt hash of admin pwd</text>
  <text x="528" y="126" text-anchor="middle" font-size="8" fill="#92400e">from: ARGO_ADMIN_SECRET org secret</text>
  <text x="528" y="140" text-anchor="middle" font-size="8" font-style="italic" fill="#b45309">ArgoCD reads admin.password as hash</text>

  <rect x="440" y="162" width="176" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="528" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="#78350f">platform/github/github-token</text>
  <text x="528" y="192" text-anchor="middle" font-size="8" fill="#92400e">value: long-lived GitHub PAT</text>
  <text x="528" y="206" text-anchor="middle" font-size="8" fill="#92400e">from: PLATFORM_GITHUB_PAT org secret</text>
  <text x="528" y="220" text-anchor="middle" font-size="8" font-style="italic" fill="#b45309">scopes: repo (read) + read:org</text>

  <!-- ORCHESTRATOR CLUSTER -->
  <rect x="16" y="264" width="928" height="350" rx="10" fill="#f8fafc" stroke="#6366f1" stroke-width="2"/>
  <rect x="16" y="264" width="928" height="26" rx="10" fill="#4f46e5"/>
  <text x="480" y="282" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Orchestrator Cluster</text>

  <!-- IRSA auth chain -->
  <rect x="28" y="298" width="270" height="130" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="163" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">IRSA Authentication Chain</text>

  <rect x="38" y="324" width="108" height="40" rx="5" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="92" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">ESO Pod</text>
  <text x="92" y="354" text-anchor="middle" font-size="8" fill="#1e40af">SA: eso-service-account</text>

  <line x1="146" y1="344" x2="162" y2="344" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="162" y="324" width="128" height="40" rx="5" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="226" y="340" text-anchor="middle" font-size="9" font-weight="600" fill="#1e3a8a">EKS OIDC Provider</text>
  <text x="226" y="354" text-anchor="middle" font-size="8" fill="#1e40af">issues JWT token</text>

  <line x1="92" y1="364" x2="92" y2="380" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <rect x="38" y="380" width="250" height="40" rx="5" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1"/>
  <text x="163" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#dbeafe">IAM Role: {cluster-name}-eso</text>
  <text x="163" y="410" text-anchor="middle" font-size="8" fill="#93c5fd">SecretsManager:Get/Describe/List · SSM · KMS</text>

  <!-- IRSA → STS → Secrets Manager -->
  <path d="M226,364 C226,250 430,200 528,160" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-blue)"/>
  <text x="350" y="248" text-anchor="middle" font-size="8" fill="#2563eb">STS AssumeRoleWithWebIdentity</text>

  <!-- ESO Operator -->
  <rect x="310" y="298" width="190" height="130" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="405" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">ESO Operator</text>
  <text x="405" y="330" text-anchor="middle" font-size="9" fill="#166534">ns: external-secrets</text>
  <text x="405" y="346" text-anchor="middle" font-size="8" fill="#16a34a">helm: external-secrets chart</text>
  <text x="405" y="360" text-anchor="middle" font-size="8" fill="#16a34a">IRSA role: {cluster-name}-eso</text>
  <text x="405" y="374" text-anchor="middle" font-size="8" fill="#16a34a">(created in eso.tf)</text>

  <rect x="320" y="382" width="170" height="38" rx="5" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="405" y="398" text-anchor="middle" font-size="9" font-weight="700" fill="#14532d">ClusterSecretStore</text>
  <text x="405" y="411" text-anchor="middle" font-size="8" fill="#166534">name: aws-secrets-manager</text>

  <!-- ESO → Secrets Manager fetch arrow -->
  <line x1="500" y1="400" x2="526" y2="205" stroke="#16a34a" stroke-width="1.5" fill="none" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <text x="535" y="308" font-size="8" fill="#16a34a" font-style="italic">GetSecretValue</text>
  <text x="535" y="320" font-size="8" fill="#16a34a" font-style="italic">every 1h</text>

  <!-- ExternalSecrets -->
  <rect x="516" y="298" width="210" height="136" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="621" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#713f12">ExternalSecrets</text>
  <text x="621" y="330" text-anchor="middle" font-size="9" fill="#854d0e">ns: argocd · refreshInterval: 1h</text>

  <rect x="526" y="338" width="190" height="44" rx="5" fill="#fef08a" stroke="#eab308" stroke-width="1"/>
  <text x="621" y="354" text-anchor="middle" font-size="9" font-weight="600" fill="#713f12">argocd-github-token</text>
  <text x="621" y="367" text-anchor="middle" font-size="8" fill="#854d0e">remote: platform/github/github-token</text>
  <text x="621" y="380" text-anchor="middle" font-size="8" fill="#854d0e">creationPolicy: Owner</text>

  <rect x="526" y="390" width="190" height="36" rx="5" fill="#fef08a" stroke="#eab308" stroke-width="1"/>
  <text x="621" y="406" text-anchor="middle" font-size="9" font-weight="600" fill="#713f12">argocd-admin-password</text>
  <text x="621" y="418" text-anchor="middle" font-size="8" fill="#854d0e">remote: platform/argocd/admin-password · Merge</text>

  <!-- ExternalSecret → ClusterSecretStore -->
  <line x1="516" y1="362" x2="490" y2="400" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Kubernetes Secrets -->
  <rect x="742" y="298" width="190" height="152" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="837" y="316" text-anchor="middle" font-size="10" font-weight="700" fill="#f8fafc">Kubernetes Secrets</text>
  <text x="837" y="330" text-anchor="middle" font-size="9" fill="#94a3b8">ns: argocd · managed by ESO</text>

  <rect x="752" y="338" width="170" height="48" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="837" y="355" text-anchor="middle" font-size="9" font-weight="600" fill="#e2e8f0">argocd-github-token</text>
  <text x="837" y="368" text-anchor="middle" font-size="8" fill="#94a3b8">key: token = &lt;GitHub PAT&gt;</text>
  <text x="837" y="380" text-anchor="middle" font-size="8" font-style="italic" fill="#64748b">→ ApplicationSet SCM provider</text>

  <rect x="752" y="394" width="170" height="48" rx="5" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="837" y="411" text-anchor="middle" font-size="9" font-weight="600" fill="#e2e8f0">argocd-secret  (merge)</text>
  <text x="837" y="424" text-anchor="middle" font-size="8" fill="#94a3b8">key: admin.password = &lt;bcrypt&gt;</text>
  <text x="837" y="436" text-anchor="middle" font-size="8" font-style="italic" fill="#64748b">→ ArgoCD admin login</text>

  <!-- ExternalSecret → K8s secrets -->
  <line x1="716" y1="362" x2="750" y2="362" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="716" y1="410" x2="750" y2="418" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="733" y="356" text-anchor="middle" font-size="8" fill="#ca8a04">syncs</text>

  <!-- ArgoCD consumers -->
  <rect x="742" y="460" width="190" height="136" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="837" y="478" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">ArgoCD Consumers</text>
  <text x="837" y="494" text-anchor="middle" font-size="9" fill="#92400e">ns: argocd</text>

  <rect x="752" y="502" width="170" height="40" rx="5" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
  <text x="837" y="518" text-anchor="middle" font-size="9" font-weight="600" fill="#713f12">ApplicationSet SCM Provider</text>
  <text x="837" y="531" text-anchor="middle" font-size="8" fill="#92400e">reads argocd-github-token → scans org</text>

  <rect x="752" y="550" width="170" height="38" rx="5" fill="#fef9c3" stroke="#fbbf24" stroke-width="1"/>
  <text x="837" y="566" text-anchor="middle" font-size="9" font-weight="600" fill="#713f12">ArgoCD Admin Auth</text>
  <text x="837" y="579" text-anchor="middle" font-size="8" fill="#92400e">reads admin.password from argocd-secret</text>

  <!-- K8s secrets → consumers -->
  <line x1="837" y1="450" x2="837" y2="459" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>

  <!-- Legend -->
  <rect x="28" y="452" width="270" height="148" rx="7" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="42" y="470" font-size="9" font-weight="700" fill="#111827">Legend</text>
  <line x1="42" y1="484" x2="72" y2="484" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="78" y="488" font-size="9" fill="#374151">Terraform creates secret in AWS</text>
  <line x1="42" y1="502" x2="72" y2="502" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>
  <text x="78" y="506" font-size="9" fill="#374151">IRSA: STS token exchange</text>
  <line x1="42" y1="520" x2="72" y2="520" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>
  <text x="78" y="524" font-size="9" fill="#374151">ESO fetches secret value (1h poll)</text>
  <line x1="42" y1="538" x2="72" y2="538" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="78" y="542" font-size="9" fill="#374151">ESO syncs → Kubernetes Secret</text>
  <text x="42" y="560" font-size="8" font-style="italic" fill="#64748b">creationPolicy: Owner → ESO creates &amp; owns the secret</text>
  <text x="42" y="573" font-size="8" font-style="italic" fill="#64748b">creationPolicy: Merge → ESO patches into existing secret</text>
  <text x="42" y="586" font-size="8" font-style="italic" fill="#64748b">ignore_changes in TF → values not re-applied on re-run</text>
</svg>
