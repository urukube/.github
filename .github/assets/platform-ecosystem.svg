  <line x1="510" y1="797" x2="540" y2="797" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="548" y="801" fill="#94a3b8" font-size="10">IRSA cross-account assume role</text>
  <rect x="720" y="788" width="12" height="12" rx="2" fill="none" stroke="#818cf8" stroke-width="2"/>
  <text x="738" y="799" fill="#94a3b8" font-size="10">XRD package</text>
  <rect x="810" y="788" width="12" height="12" rx="2" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="828" y="799" fill="#94a3b8" font-size="10">shared repo</text>

  <text x="470" y="862" text-anchor="middle" fill="#334155" font-size="10">urukube Platform · Crossplane XRD Ecosystem · platform-xp-* repositories</text>
</svg>
