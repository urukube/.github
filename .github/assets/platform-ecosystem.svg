  <text x="178" y="592" text-anchor="middle" font-size="10" fill="#64748b">function-environment-configs v0.6.0</text>
  <text x="178" y="605" text-anchor="middle" font-size="9" fill="#64748b">org-defaults + BU config → pipeline context</text>
  <line x1="306" y1="582" x2="326" y2="582" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="328" y="560" width="256" height="44" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
  <text x="456" y="577" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">Step 2 · patch-and-transform</text>
  <text x="456" y="592" text-anchor="middle" font-size="10" fill="#64748b">function-patch-and-transform v0.10.7</text>
  <text x="456" y="605" text-anchor="middle" font-size="9" fill="#64748b">creates per-claim ProviderConfig (IRSA)</text>
  <line x1="584" y1="582" x2="604" y2="582" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="606" y="560" width="280" height="44" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
  <text x="746" y="577" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">Step 3 · generate-resources</text>
  <text x="746" y="592" text-anchor="middle" font-size="10" fill="#64748b">function-go-templating v0.7.0</text>
  <text x="746" y="605" text-anchor="middle" font-size="9" fill="#64748b">all service-specific resources + status writeback</text>

  <!-- SECTION: CROSS-ACCOUNT PROVISIONING -->
  <text x="22" y="638" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">CROSS-ACCOUNT PROVISIONING</text>
  <line x1="22" y1="644" x2="918" y2="644" stroke="#1e293b" stroke-width="1.5"/>

  <rect x="38" y="652" width="860" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="55" y="664" width="170" height="76" rx="6" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="140" y="683" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">Orchestrator Cluster</text>
  <text x="140" y="697" text-anchor="middle" fill="#64748b" font-size="10">Crossplane + providers</text>
  <text x="140" y="711" text-anchor="middle" fill="#64748b" font-size="10">IRSA service account</text>
  <text x="140" y="725" text-anchor="middle" fill="#64748b" font-size="10">crossplane-irsa-role</text>
  <line x1="225" y1="702" x2="270" y2="702" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="248" y="695" text-anchor="middle" fill="#38bdf8" font-size="9">sts:AssumeRole</text>
  <rect x="272" y="664" width="190" height="76" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="367" y="683" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">ProviderConfig (per claim)</text>
  <text x="367" y="697" text-anchor="middle" fill="#64748b" font-size="10">credentials: IRSA</text>
  <text x="367" y="711" text-anchor="middle" fill="#64748b" font-size="10">assumeRoleChain →</text>
  <text x="367" y="725" text-anchor="middle" fill="#64748b" font-size="10">urukube-crossplane-role</text>
  <line x1="462" y1="702" x2="507" y2="702" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="485" y="695" text-anchor="middle" fill="#38bdf8" font-size="9">sts:AssumeRole</text>
  <rect x="509" y="664" width="230" height="76" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1.5"/>
  <text x="624" y="683" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">Target AWS Account</text>
  <text x="624" y="697" text-anchor="middle" fill="#64748b" font-size="10">arn:aws:iam::&lt;acctId&gt;:role/</text>
  <text x="624" y="711" text-anchor="middle" fill="#64748b" font-size="10">urukube-crossplane-role</text>
  <text x="624" y="725" text-anchor="middle" fill="#64748b" font-size="10">provisions: VPC / EKS / S3</text>
  <rect x="755" y="664" width="130" height="76" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="820" y="683" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Required per acct</text>
  <text x="820" y="698" text-anchor="middle" fill="#64748b" font-size="10">trust policy allows</text>
  <text x="820" y="712" text-anchor="middle" fill="#64748b" font-size="10">orchestrator IRSA</text>
  <text x="820" y="726" text-anchor="middle" fill="#64748b" font-size="10">s3:* / ec2:* / eks:*</text>

  <!-- LEGEND -->
  <rect x="38" y="770" width="868" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="56" y1="797" x2="86" y2="797" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="94" y="801" fill="#94a3b8" font-size="10">shared component dependency</text>
  <line x1="268" y1="797" x2="298" y2="797" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-g)"/>
