  <line x1="22" y1="544" x2="918" y2="544" stroke="#1e293b" stroke-width="1.5"/>

  <rect x="38" y="552" width="860" height="60" rx="8" fill="#1c1a0e" stroke="#d97706" stroke-width="1.5"/>
  <rect x="50" y="560" width="256" height="44" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1"/>
