<svg viewBox="0 0 940 900" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,monospace" font-size="12">
  <title>Platform XP Ecosystem Relationship Diagram</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#34d399"/></marker>
    <marker id="arr-p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/></marker>
  </defs>
  <rect width="940" height="900" fill="#0f172a"/>

  <!-- SECTION: SHARED INFRASTRUCTURE -->
  <text x="22" y="20" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">SHARED INFRASTRUCTURE</text>
  <line x1="22" y1="26" x2="918" y2="26" stroke="#1e293b" stroke-width="1.5"/>

  <!-- platform-xp-crossplane-shared -->
  <rect x="38" y="34" width="380" height="140" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="228" y="56" text-anchor="middle" font-weight="700" font-size="12" fill="#c4b5fd">platform-xp-crossplane-shared</text>
  <text x="228" y="72" text-anchor="middle" fill="#64748b" font-size="10">functions.yaml · ArgoCD deployed to crossplane-system</text>
  <line x1="48" y1="79" x2="408" y2="79" stroke="#334155" stroke-width="1"/>
  <rect x="55" y="87" width="108" height="74" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="109" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">function-patch</text>
  <text x="109" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">-and-transform</text>
  <text x="109" y="132" text-anchor="middle" fill="#64748b" font-size="10">v0.10.7</text>
  <text x="109" y="146" text-anchor="middle" fill="#64748b" font-size="9">ProviderConfig patches</text>
  <rect x="174" y="87" width="108" height="74" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="228" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">function-environment</text>
  <text x="228" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">-configs</text>
  <text x="228" y="132" text-anchor="middle" fill="#64748b" font-size="10">v0.6.0</text>
  <text x="228" y="146" text-anchor="middle" fill="#64748b" font-size="9">EnvironmentConfig merge</text>
  <rect x="293" y="87" width="108" height="74" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="347" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">function-go</text>
  <text x="347" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">-templating</text>
  <text x="347" y="132" text-anchor="middle" fill="#64748b" font-size="10">v0.7.0</text>
  <text x="347" y="146" text-anchor="middle" fill="#64748b" font-size="9">Dynamic resource gen</text>

  <!-- platform-tenant-registry -->
  <rect x="438" y="34" width="464" height="140" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="670" y="56" text-anchor="middle" font-weight="700" font-size="12" fill="#c4b5fd">platform-tenant-registry</text>
  <text x="670" y="72" text-anchor="middle" fill="#64748b" font-size="10">EnvironmentConfigs · ArgoCD deployed to crossplane-system</text>
  <line x1="448" y1="79" x2="892" y2="79" stroke="#334155" stroke-width="1"/>
  <rect x="455" y="87" width="190" height="74" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="550" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">org-defaults</text>
  <text x="550" y="119" text-anchor="middle" fill="#64748b" font-size="10">name: org-defaults (static ref)</text>
  <text x="550" y="133" text-anchor="middle" fill="#64748b" font-size="10">orgName · complianceScope</text>
  <text x="550" y="147" text-anchor="middle" fill="#64748b" font-size="10">managedBy · dataClassification</text>
  <rect x="660" y="87" width="220" height="74" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="770" y="105" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">BU EnvironmentConfigs</text>
  <text x="770" y="119" text-anchor="middle" fill="#64748b" font-size="10">label: bu-id=BU001/BU002/…</text>
  <text x="770" y="133" text-anchor="middle" fill="#64748b" font-size="10">buId · costCenter · ownerEmail</text>
  <text x="770" y="147" text-anchor="middle" fill="#64748b" font-size="10">matched via spec.parameters.buId</text>

  <!-- SECTION: XRD PACKAGES -->
  <text x="22" y="202" font-size="10" font-weight="600" fill="#475569" letter-spacing="1.5">XRD PACKAGES  <tspan fill="#64748b" font-size="9" letter-spacing="0">(ArgoCD discovers via platform-custom-xrds topic → deploys to crossplane-system)</tspan></text>
  <line x1="22" y1="208" x2="918" y2="208" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Dependency arrows: shared → XRDs -->
  <line x1="228" y1="174" x2="228" y2="192" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="228" y1="192" x2="157" y2="192" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="228" y1="192" x2="470" y2="192" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="228" y1="192" x2="783" y2="192" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="157" y1="192" x2="157" y2="218" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <line x1="470" y1="192" x2="470" y2="218" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <line x1="783" y1="192" x2="783" y2="218" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <line x1="670" y1="174" x2="670" y2="192" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- platform-xp-networking -->
  <rect x="38" y="218" width="258" height="220" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="167" y="240" text-anchor="middle" font-weight="700" font-size="12" fill="#a5b4fc">platform-xp-networking</text>
  <text x="167" y="256" text-anchor="middle" fill="#64748b" font-size="10">kind: UNetwork</text>
  <text x="167" y="270" text-anchor="middle" fill="#64748b" font-size="10">networking.platform.urukube.io/v1alpha1</text>
  <line x1="48" y1="277" x2="286" y2="277" stroke="#334155" stroke-width="1"/>
  <text x="167" y="294" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Provisions</text>
  <text x="167" y="308" text-anchor="middle" fill="#64748b" font-size="10">VPC + IGW</text>
  <text x="167" y="322" text-anchor="middle" fill="#64748b" font-size="10">Subnets ×3 tiers per AZ</text>
  <text x="167" y="336" text-anchor="middle" fill="#64748b" font-size="10">NAT GWs (1 or N per AZ)</text>
  <text x="167" y="350" text-anchor="middle" fill="#64748b" font-size="10">Route Tables + Routes</text>
  <text x="167" y="364" text-anchor="middle" fill="#64748b" font-size="10">Security Groups ×3</text>
  <text x="167" y="378" text-anchor="middle" fill="#64748b" font-size="10">VPC Endpoints ×11 (optional)</text>
  <line x1="48" y1="386" x2="286" y2="386" stroke="#334155" stroke-width="1"/>
  <text x="167" y="400" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">provider: upbound-provider-aws-ec2</text>
  <text x="167" y="414" text-anchor="middle" fill="#64748b" font-size="9">readiness propagated via</text>
  <text x="167" y="427" text-anchor="middle" fill="#64748b" font-size="9">gotemplating.fn.crossplane.io/ready</text>

  <!-- platform-xp-eks -->
  <rect x="341" y="218" width="258" height="220" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="470" y="240" text-anchor="middle" font-weight="700" font-size="12" fill="#a5b4fc">platform-xp-eks</text>
  <text x="470" y="256" text-anchor="middle" fill="#64748b" font-size="10">kind: UEksCluster</text>
  <text x="470" y="270" text-anchor="middle" fill="#64748b" font-size="10">eks.platform.urukube.io/v1alpha1</text>
  <line x1="351" y1="277" x2="589" y2="277" stroke="#334155" stroke-width="1"/>
  <text x="470" y="294" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Provisions</text>
  <text x="470" y="308" text-anchor="middle" fill="#64748b" font-size="10">IAM Role + InstanceProfile</text>
  <text x="470" y="322" text-anchor="middle" fill="#64748b" font-size="10">RolePolicyAttachments ×5</text>
  <text x="470" y="336" text-anchor="middle" fill="#64748b" font-size="10">EKS Cluster + kube-proxy addon</text>
  <text x="470" y="350" text-anchor="middle" fill="#64748b" font-size="10">LaunchTemplate (AL2023)</text>
  <text x="470" y="364" text-anchor="middle" fill="#64748b" font-size="10">AutoscalingGroup</text>
  <text x="470" y="378" text-anchor="middle" fill="#64748b" font-size="10">SGIngressRules (when Ready)</text>
  <line x1="351" y1="386" x2="589" y2="386" stroke="#334155" stroke-width="1"/>
  <text x="470" y="400" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">providers: eks · ec2 · autoscaling · iam</text>

  <!-- platform-xp-s3 -->
  <rect x="644" y="218" width="258" height="220" rx="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="773" y="240" text-anchor="middle" font-weight="700" font-size="12" fill="#a5b4fc">platform-xp-s3</text>
  <text x="773" y="256" text-anchor="middle" fill="#64748b" font-size="10">kind: US3Bucket</text>
  <text x="773" y="270" text-anchor="middle" fill="#64748b" font-size="10">storage.platform.urukube.io/v1alpha1</text>
  <line x1="654" y1="277" x2="892" y2="277" stroke="#334155" stroke-width="1"/>
  <text x="773" y="294" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">Provisions</text>
  <text x="773" y="308" text-anchor="middle" fill="#64748b" font-size="10">S3 Bucket</text>
  <text x="773" y="322" text-anchor="middle" fill="#64748b" font-size="10">BucketEncryption (AES256 always)</text>
  <text x="773" y="336" text-anchor="middle" fill="#64748b" font-size="10">BucketVersioning (optional)</text>
  <text x="773" y="350" text-anchor="middle" fill="#64748b" font-size="10">PublicAccessBlock (configurable)</text>
  <text x="773" y="364" text-anchor="middle" fill="#64748b" font-size="10">BucketPolicy (when !blockPublic)</text>
  <line x1="654" y1="386" x2="892" y2="386" stroke="#334155" stroke-width="1"/>
  <text x="773" y="400" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="600">provider: upbound-provider-aws-s3</text>

  <!-- Status hand-off: networking → eks -->
  <line x1="296" y1="370" x2="341" y2="370" stroke="#34d399" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="318" y="362" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">status →</text>
  <text x="318" y="374" text-anchor="middle" fill="#34d399" font-size="9">params</text>

  <!-- Option A hand-off callout -->
  <rect x="38" y="452" width="561" height="62" rx="6" fill="#0f1f18" stroke="#34d399" stroke-width="1.5"/>
  <text x="319" y="470" text-anchor="middle" font-weight="700" font-size="11" fill="#6ee7b7">Option A — Networking → EKS hand-off</text>
  <text x="319" y="486" text-anchor="middle" fill="#64748b" font-size="10">UNetwork.status.vpcId  →  UEksCluster.spec.parameters.vpcId</text>
  <text x="319" y="500" text-anchor="middle" fill="#64748b" font-size="10">UNetwork.status.eksNodeSubnetIds  →  subnetIds  ·  status.nodeSecurityGroupId  →  nodeSecurityGroupId</text>

